version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing dependencies...
      - npm install

  build:
    commands:
      - echo Building React project...
      - npm run build
      - echo Copying appspec and scripts into artifact...
      - cp appspec.yml dist/
      - cp -r scripts dist/

artifacts:
  files:
    - '**/*'
  base-directory: dist